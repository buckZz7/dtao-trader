<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#0a0a0a">
<title>dTAO Trader — Subnet Ranking</title>
<style>
:root {
  --bg: #0a0a0a;
  --card: #141414;
  --border: #222;
  --text: #e0e0e0;
  --dim: #666;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #facc15;
  --orange: #f97316;
  --lime: #84cc16;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mono: 'SF Mono', 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  padding: 16px;
  max-width: 1400px;
  margin: 0 auto;
  -webkit-text-size-adjust: 100%;
}
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.meta { color: var(--dim); font-size: 11px; font-family: var(--mono); margin-bottom: 16px; }
.controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.controls input, .controls select {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 14px;
  min-height: 44px;
}
.controls input { flex: 1; min-width: 150px; }
.controls select { cursor: pointer; }

.stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-bottom: 16px; }
.stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
.stat-val { font-size: 20px; font-weight: 700; font-family: var(--mono); }
.stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }

/* Desktop table */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--dim); border-bottom: 1px solid var(--border); cursor: pointer; white-space: nowrap; }
th:hover { color: var(--text); }
td { padding: 8px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 12px; white-space: nowrap; }
tr:hover { background: var(--card); }
.sn { color: var(--dim); }
.name { font-family: var(--font); font-weight: 500; }
.score-bar { display: inline-block; height: 16px; border-radius: 2px; vertical-align: middle; margin-right: 4px; }
.verdict { font-family: var(--font); font-weight: 600; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
.v-strong { background: #162316; color: var(--green); }
.v-buy { background: #1a2316; color: var(--lime); }
.v-fair { background: #231f16; color: var(--yellow); }
.v-avoid { background: #231616; color: var(--orange); }
.v-risky { background: #231616; color: var(--red); }
.v-dead { background: #1a1a1a; color: var(--dim); }
.pos { color: var(--green); }
.neg { color: var(--red); }
.dim { color: var(--dim); }
.footer { margin-top: 16px; color: var(--dim); font-size: 11px; text-align: center; }

/* Mobile card layout */
.cards { display: none; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 8px;
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.card-name { font-size: 15px; font-weight: 600; }
.card-sn { color: var(--dim); font-size: 12px; font-family: var(--mono); margin-left: 6px; }
.card-rank { font-size: 12px; color: var(--dim); }
.card-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 12px;
}
.card-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}
.card-label { color: var(--dim); }
.card-val { font-family: var(--mono); font-weight: 500; }
.card-scores {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.card-score-chip {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: #1a1a1a;
  font-family: var(--mono);
}
.card-verdict { margin-top: 10px; }

@media (max-width: 768px) {
  body { padding: 8px; font-size: 13px; }
  h1 { font-size: 18px; }
  .stats { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .stat { padding: 8px; }
  .stat-val { font-size: 16px; }
  .stat-label { font-size: 9px; }
  .controls input, .controls select { font-size: 13px; min-height: 44px; }
  .table-wrap { display: none; }
  .cards { display: block; }
}
</style>
</head>
<body>
<h1>dTAO Subnet Ranking</h1>
<div class="meta" id="meta">Loading...</div>

<div class="stats" id="stats"></div>

<div class="controls">
  <input type="text" id="search" placeholder="Search subnets..." oninput="render()">
  <select id="filter" onchange="render()">
    <option value="all">All</option>
    <option value="strong">Strong Buy</option>
    <option value="buy">Buy</option>
    <option value="fair">Fair</option>
    <option value="avoid">Avoid</option>
    <option value="risky">Risky</option>
    <option value="dead">Dead</option>
  </select>
</div>

<!-- Desktop: table -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('rank')" style="width:30px">#</th>
        <th onclick="sortBy('netuid')">SN</th>
        <th onclick="sortBy('name')">Name</th>
        <th onclick="sortBy('price')">Price</th>
        <th onclick="sortBy('equilibrium')">Equilibrium</th>
        <th onclick="sortBy('distance_pct')">Diff%</th>
        <th onclick="sortBy('total_score')">SCORE</th>
        <th class="hide-mobile" onclick="sortBy('scores.valuation')">Val</th>
        <th class="hide-mobile" onclick="sortBy('scores.code')">Code</th>
        <th class="hide-mobile" onclick="sortBy('scores.conviction')">Conv</th>
        <th class="hide-mobile" onclick="sortBy('scores.holders')">Hold</th>
        <th class="hide-mobile" onclick="sortBy('scores.activity')">Act</th>
        <th class="hide-mobile" onclick="sortBy('locked_pct')">Locked%</th>
        <th class="hide-mobile" onclick="sortBy('cb_vs_pool')">CB%</th>
        <th class="hide-mobile" onclick="sortBy('commits_30d')">C30d</th>
        <th>Verdict</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- Mobile: cards -->
<div class="cards" id="cards"></div>

<div class="footer">
  Score = Valuation (25) + Code (25) + Conviction (20) + Holders (15) + Activity (15) = 100
</div>

<script>
let data = null;
let sortKey = 'total_score';
let sortDir = -1;

async function loadData() {
  try {
    const res = await fetch('rankings-data.json');
    data = await res.json();
    render();
    setTimeout(loadData, 300000);
  } catch (e) {
    document.getElementById('meta').textContent = 'Error: ' + e.message;
  }
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = -1; }
  render();
}

function getVal(obj, key) {
  return key.split('.').reduce((o, k) => o?.[k], obj) ?? 0;
}

function filterRows(rankings) {
  const search = document.getElementById('search').value.toLowerCase();
  const filter = document.getElementById('filter').value;
  return rankings.filter(r => {
    if (search && !r.name.toLowerCase().includes(search) && !String(r.netuid).includes(search)) return false;
    if (filter === 'strong' && r.verdict !== 'STRONG BUY') return false;
    if (filter === 'buy' && r.verdict !== 'BUY') return false;
    if (filter === 'fair' && r.verdict !== 'FAIR') return false;
    if (filter === 'avoid' && r.verdict !== 'AVOID') return false;
    if (filter === 'risky' && r.verdict !== 'RISKY') return false;
    if (filter === 'dead' && r.verdict !== 'DEAD') return false;
    return true;
  });
}

function sortRows(rows) {
  return rows.sort((a, b) => {
    let va = getVal(a, sortKey);
    let vb = getVal(b, sortKey);
    if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
    return (va - vb) * sortDir;
  });
}

function renderTable(rows) {
  const vClass = { 'STRONG BUY': 'v-strong', 'BUY': 'v-buy', 'FAIR': 'v-fair', 'AVOID': 'v-avoid', 'RISKY': 'v-risky', 'DEAD': 'v-dead' };
  document.getElementById('tbody').innerHTML = rows.map(r => {
    const s = r.scores;
    const scoreColor = r.total_score >= 60 ? 'var(--green)' : r.total_score >= 45 ? 'var(--lime)' : r.total_score >= 30 ? 'var(--yellow)' : r.total_score >= 15 ? 'var(--orange)' : 'var(--red)';
    const scoreBar = `<span class="score-bar" style="width:${r.total_score * 1.2}px;background:${scoreColor}"></span>`;
    return `
      <tr>
        <td class="dim">${r.rank}</td>
        <td class="sn">${r.netuid}</td>
        <td class="name">${r.name}</td>
        <td>${r.price.toFixed(5)}</td>
        <td class="${r.equilibrium > r.price ? 'pos' : r.equilibrium < r.price * 0.5 ? 'neg' : ''}">${r.equilibrium > 0 ? r.equilibrium.toFixed(5) : '—'}</td>
        <td class="${r.distance_pct < -20 ? 'pos' : r.distance_pct > 50 ? 'neg' : ''}">${r.distance_pct > 0 ? '+' : ''}${r.distance_pct.toFixed(1)}%</td>
        <td>${scoreBar}<span style="color:${scoreColor}">${r.total_score.toFixed(0)}</span></td>
        <td class="hide-mobile">${s.valuation.toFixed(0)}</td>
        <td class="hide-mobile">${s.code.toFixed(0)}</td>
        <td class="hide-mobile">${s.conviction.toFixed(0)}</td>
        <td class="hide-mobile">${s.holders.toFixed(0)}</td>
        <td class="hide-mobile">${s.activity.toFixed(0)}</td>
        <td class="hide-mobile ${r.locked_pct > 20 ? 'pos' : ''}">${r.locked_pct > 0 ? r.locked_pct.toFixed(1) + '%' : '—'}</td>
        <td class="hide-mobile">${r.cb_vs_pool > 0 ? r.cb_vs_pool.toFixed(2) + '%' : '—'}</td>
        <td class="hide-mobile">${r.commits_30d > 0 ? r.commits_30d : '—'}</td>
        <td><span class="verdict ${vClass[r.verdict]}">${r.verdict}</span></td>
      </tr>`;
  }).join('');
}

function renderCards(rows) {
  const vClass = { 'STRONG BUY': 'v-strong', 'BUY': 'v-buy', 'FAIR': 'v-fair', 'AVOID': 'v-avoid', 'RISKY': 'v-risky', 'DEAD': 'v-dead' };
  const scoreColor = (score) => score >= 60 ? 'var(--green)' : score >= 45 ? 'var(--lime)' : score >= 30 ? 'var(--yellow)' : score >= 15 ? 'var(--orange)' : 'var(--red)';
  
  document.getElementById('cards').innerHTML = rows.map(r => {
    const s = r.scores;
    const sc = scoreColor(r.total_score);
    const distClass = r.distance_pct < -20 ? 'pos' : r.distance_pct > 50 ? 'neg' : '';
    const eqClass = r.equilibrium > r.price ? 'pos' : r.equilibrium < r.price * 0.5 ? 'neg' : '';
    
    return `
      <div class="card">
        <div class="card-header">
          <div><span class="card-name">${r.name}</span><span class="card-sn">SN${r.netuid}</span></div>
          <div class="card-rank">#${r.rank}</div>
        </div>
        <div class="card-grid">
          <div class="card-row"><span class="card-label">Price</span><span class="card-val">${r.price.toFixed(5)}</span></div>
          <div class="card-row"><span class="card-label">Equilibrium</span><span class="card-val ${eqClass}">${r.equilibrium > 0 ? r.equilibrium.toFixed(5) : '—'}</span></div>
          <div class="card-row"><span class="card-label">Diff</span><span class="card-val ${distClass}">${r.distance_pct > 0 ? '+' : ''}${r.distance_pct.toFixed(1)}%</span></div>
          <div class="card-row"><span class="card-label">Score</span><span class="card-val" style="color:${sc}">${r.total_score.toFixed(0)}/100</span></div>
          <div class="card-row"><span class="card-label">Locked</span><span class="card-val ${r.locked_pct > 20 ? 'pos' : ''}">${r.locked_pct > 0 ? r.locked_pct.toFixed(1) + '%' : '—'}</span></div>
          <div class="card-row"><span class="card-label">Commits 30d</span><span class="card-val">${r.commits_30d > 0 ? r.commits_30d : '—'}</span></div>
        </div>
        <div class="card-scores">
          <span class="card-score-chip">V${s.valuation.toFixed(0)}</span>
          <span class="card-score-chip">C${s.code.toFixed(0)}</span>
          <span class="card-score-chip">L${s.conviction.toFixed(0)}</span>
          <span class="card-score-chip">H${s.holders.toFixed(0)}</span>
          <span class="card-score-chip">A${s.activity.toFixed(0)}</span>
        </div>
        <div class="card-verdict"><span class="verdict ${vClass[r.verdict]}">${r.verdict}</span></div>
      </div>`;
  }).join('');
}

function render() {
  if (!data) return;
  const rankings = data.rankings;
  
  document.getElementById('meta').textContent = 
    `${new Date(data.timestamp).toISOString().replace('T',' ').slice(0,19)} UTC · ${rankings.length} subnets`;

  const strong = rankings.filter(r => r.verdict === 'STRONG BUY').length;
  const buy = rankings.filter(r => r.verdict === 'BUY').length;
  const fair = rankings.filter(r => r.verdict === 'FAIR').length;
  const avoid = rankings.filter(r => r.verdict === 'AVOID').length;
  const risky = rankings.filter(r => r.verdict === 'RISKY').length;
  const dead = rankings.filter(r => r.verdict === 'DEAD').length;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-val pos">${strong}</div><div class="stat-label">Strong Buy</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--lime)">${buy}</div><div class="stat-label">Buy</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--yellow)">${fair}</div><div class="stat-label">Fair</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--orange)">${avoid}</div><div class="stat-label">Avoid</div></div>
    <div class="stat"><div class="stat-val neg">${risky}</div><div class="stat-label">Risky</div></div>
    <div class="stat"><div class="stat-val dim">${dead}</div><div class="stat-label">Dead</div></div>
  `;

  let rows = sortRows(filterRows(rankings));
  renderTable(rows);
  renderCards(rows);
}

loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>dTAO Trader — Subnet Ranking</title>
<style>
:root {
  --bg: #0a0a0a;
  --card: #141414;
  --border: #222;
  --text: #e0e0e0;
  --dim: #666;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #facc15;
  --blue: #60a5fa;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  padding: 16px;
  max-width: 1400px;
  margin: 0 auto;
}
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.meta { color: var(--dim); font-size: 12px; font-family: var(--mono); margin-bottom: 16px; }
.controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.controls input, .controls select {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
}
.controls input { flex: 1; min-width: 200px; }
.controls select { cursor: pointer; }

.stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-bottom: 16px; }
.stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.stat-val { font-size: 22px; font-weight: 700; font-family: var(--mono); }
.stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }

table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--dim); border-bottom: 1px solid var(--border); cursor: pointer; white-space: nowrap; }
th:hover { color: var(--text); }
td { padding: 8px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 12px; white-space: nowrap; }
tr:hover { background: var(--card); }
.sn { color: var(--dim); }
.name { font-family: var(--font); font-weight: 500; }
.score-bar { display: inline-block; height: 16px; border-radius: 2px; vertical-align: middle; margin-right: 4px; }
.verdict { font-family: var(--font); font-weight: 600; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
.v-strong { background: #162316; color: var(--green); }
.v-buy { background: #1a2316; color: #84cc16; }
.v-fair { background: #231f16; color: var(--yellow); }
.v-avoid { background: #231616; color: #f97316; }
.v-risky { background: #231616; color: var(--red); }
.v-dead { background: #1a1a1a; color: var(--dim); }
.pos { color: var(--green); }
.neg { color: var(--red); }
.dim { color: var(--dim); }
.footer { margin-top: 16px; color: var(--dim); font-size: 11px; text-align: center; }
@media (max-width: 768px) {
  body { padding: 8px; font-size: 12px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  table { font-size: 11px; }
  th, td { padding: 4px; }
  .hide-mobile { display: none; }
}
/* Horizontal scroll on mobile */
.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--border) var(--bg);
}
.table-scroll::-webkit-scrollbar { height: 6px; }
.table-scroll::-webkit-scrollbar-track { background: var(--bg); }
.table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
@media (max-width: 768px) {
  .hide-mobile { display: none; }
  .table-scroll table { min-width: 700px; }
}
</style>
</head>
<body>
<h1>dTAO Subnet Ranking</h1>
<div class="meta" id="meta">Loading...</div>

<div class="stats" id="stats"></div>

<div class="controls">
  <input type="text" id="search" placeholder="Search subnets..." oninput="render()">
  <select id="filter" onchange="render()">
    <option value="all">All subnets</option>
    <option value="strong">Strong Buy</option>
    <option value="buy">Buy</option>
    <option value="fair">Fair</option>
    <option value="avoid">Avoid</option>
    <option value="risky">Risky</option>
    <option value="dead">Dead (emission off)</option>
  </select>
</div>

<div class="table-scroll">
  <table>
    <thead>
    <tr>
      <th onclick="sortBy('rank')" style="width:30px">#</th>
      <th onclick="sortBy('netuid')">SN</th>
      <th onclick="sortBy('name')">Name</th>
      <th onclick="sortBy('price')">Price</th>
      <th onclick="sortBy('equilibrium')">Equilibrium</th>
      <th onclick="sortBy('distance_pct')">Diff%</th>
      <th onclick="sortBy('total_score')">SCORE</th>
      <th class="hide-mobile" onclick="sortBy('scores.valuation')">Val</th>
      <th class="hide-mobile" onclick="sortBy('scores.code')">Code</th>
      <th class="hide-mobile" onclick="sortBy('scores.conviction')">Conv</th>
      <th class="hide-mobile" onclick="sortBy('scores.holders')">Hold</th>
      <th class="hide-mobile" onclick="sortBy('scores.activity')">Act</th>
      <th onclick="sortBy('locked_pct')" class="hide-mobile">Locked%</th>
      <th onclick="sortBy('cb_vs_pool')" class="hide-mobile">CB%</th>
      <th onclick="sortBy('commits_30d')" class="hide-mobile">C30d</th>
      <th>Verdict</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
  </table>
</div>

<div class="footer">
  Composite score = Valuation (25) + Code Quality (25) + Conviction (20) + Holders (15) + Activity (15) = 100 max
</div>

<script>
let data = null;
let sortKey = 'total_score';
let sortDir = -1;

async function loadData() {
  try {
    const res = await fetch('rankings-data.json');
    data = await res.json();
    render();
    setTimeout(loadData, 300000);
  } catch (e) {
    document.getElementById('meta').textContent = 'Error: ' + e.message;
  }
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = -1; }
  render();
}

function getVal(obj, key) {
  return key.split('.').reduce((o, k) => o?.[k], obj) ?? 0;
}

function render() {
  if (!data) return;
  
  const rankings = data.rankings;
  document.getElementById('meta').textContent = 
    `${new Date(data.timestamp).toISOString().replace('T',' ').slice(0,19)} UTC · ${rankings.length} subnets ranked`;

  const strong = rankings.filter(r => r.verdict === 'STRONG BUY').length;
  const buy = rankings.filter(r => r.verdict === 'BUY').length;
  const fair = rankings.filter(r => r.verdict === 'FAIR').length;
  const avoid = rankings.filter(r => r.verdict === 'AVOID').length;
  const risky = rankings.filter(r => r.verdict === 'RISKY').length;
  const dead = rankings.filter(r => r.verdict === 'DEAD').length;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-val pos">${strong}</div><div class="stat-label">Strong Buy</div></div>
    <div class="stat"><div class="stat-val" style="color:#84cc16">${buy}</div><div class="stat-label">Buy</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--yellow)">${fair}</div><div class="stat-label">Fair</div></div>
    <div class="stat"><div class="stat-val" style="color:#f97316">${avoid}</div><div class="stat-label">Avoid</div></div>
    <div class="stat"><div class="stat-val neg">${risky}</div><div class="stat-label">Risky</div></div>
    <div class="stat"><div class="stat-val dim">${dead}</div><div class="stat-label">Dead</div></div>
  `;

  const search = document.getElementById('search').value.toLowerCase();
  const filter = document.getElementById('filter').value;
  
  let rows = rankings.filter(r => {
    if (search && !r.name.toLowerCase().includes(search) && !String(r.netuid).includes(search)) return false;
    if (filter === 'strong' && r.verdict !== 'STRONG BUY') return false;
    if (filter === 'buy' && r.verdict !== 'BUY') return false;
    if (filter === 'fair' && r.verdict !== 'FAIR') return false;
    if (filter === 'avoid' && r.verdict !== 'AVOID') return false;
    if (filter === 'risky' && r.verdict !== 'RISKY') return false;
    if (filter === 'dead' && r.verdict !== 'DEAD') return false;
    return true;
  });

  rows.sort((a, b) => {
    let va = getVal(a, sortKey);
    let vb = getVal(b, sortKey);
    if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
    return (va - vb) * sortDir;
  });

  const vClass = { 'STRONG BUY': 'v-strong', 'BUY': 'v-buy', 'FAIR': 'v-fair', 'AVOID': 'v-avoid', 'RISKY': 'v-risky', 'DEAD': 'v-dead' };
  
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rows.map(r => {
    const s = r.scores;
    const scoreColor = r.total_score >= 60 ? 'var(--green)' : r.total_score >= 45 ? '#84cc16' : r.total_score >= 30 ? 'var(--yellow)' : r.total_score >= 15 ? '#f97316' : 'var(--red)';
    const scoreBar = `<span class="score-bar" style="width:${r.total_score * 1.2}px;background:${scoreColor}"></span>`;
    const distClass = r.distance_pct < -20 ? 'pos' : r.distance_pct > 50 ? 'neg' : '';
    
    return `
      <tr>
        <td class="dim">${r.rank}</td>
        <td class="sn">${r.netuid}</td>
        <td class="name">${r.name}</td>
        <td>${r.price.toFixed(5)}</td>
        <td class="${r.equilibrium > r.price ? 'pos' : r.equilibrium < r.price * 0.5 ? 'neg' : ''}">${r.equilibrium > 0 ? r.equilibrium.toFixed(5) : '—'}</td>
        <td class="${r.distance_pct < -20 ? 'pos' : r.distance_pct > 50 ? 'neg' : ''}">${r.distance_pct > 0 ? '+' : ''}${r.distance_pct.toFixed(1)}%</td>
        <td>${scoreBar}<span style="color:${scoreColor}">${r.total_score.toFixed(0)}</span></td>
        <td class="hide-mobile">${s.valuation.toFixed(0)}</td>
        <td class="hide-mobile">${s.code.toFixed(0)}</td>
        <td class="hide-mobile">${s.conviction.toFixed(0)}</td>
        <td class="hide-mobile">${s.holders.toFixed(0)}</td>
        <td class="hide-mobile">${s.activity.toFixed(0)}</td>
        <td class="hide-mobile ${r.locked_pct > 20 ? 'pos' : ''}">${r.locked_pct > 0 ? r.locked_pct.toFixed(1) + '%' : '—'}</td>
        <td class="hide-mobile">${r.cb_vs_pool > 0 ? r.cb_vs_pool.toFixed(2) + '%' : '—'}</td>
        <td class="hide-mobile">${r.commits_30d > 0 ? r.commits_30d : '—'}</td>
        <td><span class="verdict ${vClass[r.verdict]}">${r.verdict}</span></td>
      </tr>
    `;
  }).join('');
}

loadData();
</script>
</body>
</html>
